<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Souboj vlajek</title>

  <!-- PWA manifest (inline as data URI pro single-file) -->
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Souboj%20vlajek%22%2C%22short_name%22%3A%22Vlajky%22%2C%22description%22%3A%22Kviz%20pro%20h%C3%A1d%C3%A1n%C3%AD%20vlajek%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f0f2f8%22%2C%22theme_color%22%3A%22%23667eea%22%2C%22orientation%22%3A%22portrait%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%253D'http%253A%252F%252Fwww.w3.org%252F2000%252Fsvg'%2520viewBox%253D'0%25200%2520512%2520512'%253E%253Crect%2520width%253D'512'%2520height%253D'512'%2520rx%253D'100'%2520fill%253D'%2523667eea'%252F%253E%253Ctext%2520x%253D'50%2525'%2520y%253D'55%2525'%2520font-size%253D'300'%2520text-anchor%253D'middle'%2520dominant-baseline%253D'middle'%253E%25F0%259F%258C%258D%253C%252Ftext%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D" />

  <!-- iOS PWA meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Vlajky" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#667eea" />

  <!-- iOS touch icon (inline SVG jako data URI) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%23667eea'/><text x='50%25' y='55%25' font-size='300' text-anchor='middle' dominant-baseline='middle'>🌍</text></svg>" />
  <style>
    :root {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --bg-dark: #f0f2f8;
      --bg-card: #ffffff;
      --bg-input: #eef0f7;
      --bg-button: #dde1f0;
      --border-subtle: rgba(0,0,50,.08);
      --border-medium: rgba(0,0,50,.14);
      --text-primary: #1a1f3c;
      --text-secondary: #5a6078;
      --accent: #667eea;
      --accent-light: rgba(102,126,234,.12);
      --success: rgba(39, 174, 96, .7);
      --success-bg: rgba(39, 174, 96, .1);
      --error: rgba(192, 57, 43, .7);
      --error-bg: rgba(192, 57, 43, .1);
      --warning: rgba(200, 155, 0, .7);
      --warning-bg: rgba(200, 155, 0, .1);
      --player1: #3498db;
      --player2: #e74c3c;
      --player3: #2ecc71;
      --player4: #f39c12;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      margin: 0;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding-bottom: env(safe-area-inset-bottom);
      overflow-x: hidden;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 12px;
      padding-top: max(12px, env(safe-area-inset-top));
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,80,.06);
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      letter-spacing: -0.02em;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .setup-screen, .game-screen, .results-screen {
      display: none;
    }

    .setup-screen.active, .game-screen.active, .results-screen.active {
      display: block;
    }

    .player-setup {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    .player-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .player-input-row input {
      flex: 1;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border-medium);
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 16px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      /* Prevent iOS zoom on focus */
      font-size: 16px;
    }

    .player-input-row input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .player-color-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,.8);
      box-shadow: 0 1px 4px rgba(0,0,0,.15);
      flex-shrink: 0;
    }

    .btn-remove {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--error);
      background: var(--error-bg);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 14px;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      padding: 14px 20px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-medium);
      background: var(--bg-button);
      color: var(--text-primary);
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      transition: filter 0.15s ease, transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      min-height: 44px;
    }

    button:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    button:active:not(:disabled) {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    button.primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      font-size: 16px;
      padding: 16px 24px;
      box-shadow: 0 4px 14px rgba(102,126,234,.3);
    }

    button.primary:active:not(:disabled) {
      box-shadow: 0 2px 6px rgba(102,126,234,.2);
    }

    button.secondary {
      background: var(--bg-input);
    }

    .current-turn, .turn-info, .timer, .question-counter {
      display: none;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .flagBox {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: var(--bg-input);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      min-height: 180px;
    }

    img.flag {
      width: min(380px, 100%);
      height: auto;
      border-radius: var(--radius-sm);
      background: #fff;
      box-shadow: 0 3px 10px rgba(0,0,0,.2);
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .choice {
      text-align: left;
      position: relative;
      font-size: 15px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      min-height: 48px;
      line-height: 1.4;
    }

    .choice.correct {
      background: var(--success-bg);
      border-color: var(--success);
    }

    .choice.incorrect {
      background: var(--error-bg);
      border-color: var(--error);
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .player-card {
      padding: 10px;
      background: var(--bg-card);
      border-radius: var(--radius-md);
      border: 2px solid;
      text-align: center;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }

    .player-card.active {
      background: var(--accent-light);
      box-shadow: 0 2px 16px rgba(102,126,234,.15);
    }

    .player-card .name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-card .score {
      font-size: 26px;
      font-weight: 800;
      margin: 2px 0;
      letter-spacing: -0.02em;
    }

    .player-card .details {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .player-card .timer-display {
      font-size: 22px;
      font-weight: 700;
      margin-top: 6px;
      padding: 4px 8px;
      background: rgba(0,0,80,.06);
      border-radius: var(--radius-sm);
      font-variant-numeric: tabular-nums;
    }

    .player-card .timer-display.warning {
      background: var(--warning-bg);
      border: 2px solid var(--warning);
      animation: pulse 0.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 16px 0;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-input);
      border-radius: var(--radius-md);
      border-left: 4px solid;
    }

    .result-item:first-child {
      background: var(--accent-light);
      border-left-color: var(--accent);
    }

    .result-rank {
      font-size: 22px;
      flex-shrink: 0;
      width: 36px;
      text-align: center;
    }

    .result-info {
      flex: 1;
      min-width: 0;
    }

    .result-name {
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-stats {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .result-score {
      font-size: 22px;
      font-weight: 800;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .result-item:first-child .result-score {
      font-size: 26px;
    }

    .center {
      text-align: center;
    }

    .msg {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-medium);
      background: rgba(255,255,255,.06);
      animation: slideIn 0.2s ease;
      text-align: center;
      font-size: 14px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.ok {
      border-color: var(--success);
      background: var(--success-bg);
    }

    .msg.bad {
      border-color: var(--error);
      background: var(--error-bg);
    }

    .small {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.35;
    }

    .loader {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,50,.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn-group button {
      flex: 1;
      min-width: 0;
    }

    .info-box {
      background: var(--accent-light);
      border: 1px solid rgba(102,126,234,.2);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 16px;
    }

    .info-box strong {
      color: var(--accent);
    }

    .info-box ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .info-box li {
      margin: 4px 0;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ===== MOBILE-FIRST RESPONSIVE ===== */

    /* Very small phones (320px) */
    @media (max-width: 359px) {
      .wrap { padding: 8px; }
      .card { padding: 12px; border-radius: var(--radius-md); }
      h1 { font-size: 20px; }
      h2 { font-size: 16px; }
      .flagBox { min-height: 140px; padding: 12px; }
      .player-card .score { font-size: 22px; }
      .player-card .name { font-size: 13px; }
      .scoreboard { grid-template-columns: repeat(2, 1fr); gap: 6px; }
      .choice { padding: 12px; font-size: 14px; }
      .btn-group { gap: 8px; }
      .btn-group button { font-size: 14px; padding: 12px 16px; }
      .result-item { padding: 10px; gap: 8px; }
      .result-rank { font-size: 18px; width: 30px; }
      .result-score { font-size: 18px; }
      .result-item:first-child .result-score { font-size: 22px; }
    }

    /* Small phones (360-479px) */
    @media (min-width: 360px) and (max-width: 479px) {
      .scoreboard { grid-template-columns: repeat(2, 1fr); }
    }

    /* Medium phones / small tablets (480-699px) */
    @media (min-width: 480px) {
      .wrap { padding: 16px; }
      .card { padding: 20px; }
      h1 { font-size: 24px; }
      .flagBox { min-height: 200px; }
      .scoreboard { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
      .player-card { padding: 12px; }
      .player-card .name { font-size: 15px; }
      .player-card .score { font-size: 28px; }
    }

    /* Tablets and desktop (700px+) */
    @media (min-width: 700px) {
      .wrap { padding: 24px; padding-top: max(24px, env(safe-area-inset-top)); }
      .card { padding: 24px; border-radius: var(--radius-xl); }
      h1 { font-size: 28px; margin-bottom: 12px; }
      h2 { font-size: 20px; }
      .choices { grid-template-columns: 1fr 1fr; gap: 12px; }
      .choice { font-size: 16px; padding: 16px 20px; }
      .flagBox { min-height: 280px; padding: 24px; }
      img.flag { width: min(420px, 100%); }
      .scoreboard { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
      .player-card { padding: 16px; }
      .player-card .name { font-size: 16px; }
      .player-card .score { font-size: 32px; }
      .player-card .details { font-size: 13px; }
      .player-card .timer-display { font-size: 28px; }
      .result-item { padding: 14px 16px; }
      .result-name { font-size: 16px; }
      .result-stats { font-size: 13px; }
      .msg { font-size: 15px; }
      .info-box li { font-size: 15px; }
      .btn-group button { flex: 0 1 auto; }
    }

    /* Large screens (900px+) */
    @media (min-width: 900px) {
      .scoreboard { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    }

    /* Landscape phones - constrain height */
    @media (max-height: 500px) and (orientation: landscape) {
      .flagBox { min-height: 120px; padding: 8px; }
      img.flag { max-height: 150px; width: auto; }
      .player-card .score { font-size: 20px; }
      .player-card .timer-display { font-size: 18px; margin-top: 4px; }
      h1 { font-size: 18px; margin-bottom: 4px; }
    }

    /* Reduce motion for users who prefer it */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-dark: #0f1225;
        --bg-card: #1a1e36;
        --bg-input: #232847;
        --bg-button: #2a3058;
        --border-subtle: rgba(200,210,255,.08);
        --border-medium: rgba(200,210,255,.14);
        --text-primary: #e8ecfa;
        --text-secondary: #9aa0bc;
        --accent-light: rgba(102,126,234,.18);
      }

      .player-color-badge {
        border-color: rgba(0,0,0,.3);
      }

      img.flag {
        box-shadow: 0 3px 10px rgba(0,0,0,.4);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🏆 Souboj vlajek</h1>
    
    <!-- Setup Screen -->
    <div class="setup-screen active" id="setupScreen">
      <div class="card">
        <h2>Nastavení hráčů</h2>
        
        <div class="info-box">
          <strong>Pravidla hry:</strong>
          <ul>
            <li>Každý hráč odpoví na <strong>15 otázek</strong></li>
            <li>Na každou odpověď máte <strong>30 sekund</strong></li>
            <li>Za správnou odpověď: <strong>+1 bod</strong></li>
            <li><strong>Hráči se střídají po každé otázce</strong></li>
            <li>Vyhrává hráč s nejvyšším skóre!</li>
          </ul>
        </div>
        
        <div class="player-setup" id="playerSetup">
          <!-- Player inputs will be added here -->
        </div>
        
        <div class="btn-group">
          <button class="secondary" onclick="app.addPlayer()">➕ Přidat hráče</button>
          <button class="primary" onclick="app.startGame()">🎮 Začít hru</button>
        </div>
        
        <div id="setupMessage" class="msg" style="display:none;"></div>
      </div>
    </div>
    
    <!-- Game Screen -->
    <div class="game-screen" id="gameScreen">
      <div class="scoreboard" id="scoreboard">
        <!-- Player cards will be added here -->
      </div>
      
      <div class="card">
        <div class="flagBox">
          <img id="flagImg" class="flag" alt="Vlajka" loading="eager" decoding="async" />
        </div>
        
        <div class="choices" id="choices"></div>
        
        <div id="gameMessage" class="msg" style="display:none;"></div>
      </div>
    </div>
    
    <!-- Results Screen -->
    <div class="results-screen" id="resultsScreen">
      <div class="card">
        <h2 class="center">🎉 Výsledky hry</h2>

        <div class="results-list" id="resultsList">
          <!-- Results will be added here -->
        </div>

        <div class="btn-group">
          <button class="primary" onclick="app.newGame()">🔄 Nová hra</button>
          <button class="secondary" onclick="app.backToSetup()">⚙️ Změnit hráče</button>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  'use strict';
  
  // ===== CONSTANTS =====
  const API_URL = "https://restcountries.com/v3.1/all?fields=cca2,name,flags,translations";
  const QUESTIONS_PER_PLAYER = 15;
  const TIME_PER_QUESTION = 30;
  const CHOICE_COUNT = 4;
  const PLAYER_COLORS = ['#3498db', '#e74c3c', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c'];
  
  const CZ_OVERRIDES = {
    "CZ": "Česká republika", "US": "Spojené státy americké", "GB": "Spojené království",
    "RU": "Rusko", "KR": "Jižní Korea", "KP": "Severní Korea", "AE": "Spojené arabské emiráty",
    "IR": "Írán", "SY": "Sýrie", "CD": "Kongo (DRC)", "CG": "Kongo", "CI": "Pobřeží slonoviny",
    "VA": "Vatikán", "TL": "Východní Timor", "MK": "Severní Makedonie"
  };

  // ===== STATE =====
  const app = {
    countries: [],
    players: [],
    currentPlayerIndex: 0,
    currentQuestion: null,
    timerInterval: null,
    timeRemaining: TIME_PER_QUESTION,
    isAnswered: false,
    gameState: 'setup', // setup, playing, results
    
    // ===== INITIALIZATION =====
    async init() {
      try {
        this.showMessage('setupMessage', 'Načítám seznam zemí...', null);
        this.countries = await this.loadCountries();
        this.showMessage('setupMessage', `✓ Načteno ${this.countries.length} zemí`, 'ok');
        setTimeout(() => this.hideMessage('setupMessage'), 2000);
        
        // Add 2 default players
        this.addPlayer('Hráč 1');
        this.addPlayer('Hráč 2');
        
      } catch (err) {
        console.error('Failed to load countries:', err);
        this.showMessage('setupMessage', 'Nepodařilo se načíst seznam zemí. Zkontroluj připojení.', 'bad');
      }
    },
    
    // ===== API =====
    async loadCountries() {
      const response = await fetch(API_URL);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const data = await response.json();
      const cleaned = data
        .map(country => {
          const code = country.cca2;
          const apiName = country?.translations?.ces?.common || country?.name?.common;
          const name = (CZ_OVERRIDES[code] || apiName || "").trim();
          return { code, name, flagPng: country?.flags?.png || null };
        })
        .filter(c => c.code && c.name && c.flagPng);

      const uniqueMap = new Map();
      cleaned.forEach(c => {
        const key = c.code.toUpperCase();
        if (!uniqueMap.has(key)) uniqueMap.set(key, c);
      });

      return Array.from(uniqueMap.values()).sort((a, b) => 
        a.name.localeCompare(b.name, "cs")
      );
    },
    
    // ===== PLAYER MANAGEMENT =====
    addPlayer(defaultName = '') {
      if (this.players.length >= 6) {
        this.showMessage('setupMessage', 'Maximum je 6 hráčů!', 'bad');
        return;
      }
      
      const playerNum = this.players.length + 1;
      const player = {
        id: Date.now() + playerNum,
        name: defaultName || `Hráč ${playerNum}`,
        color: PLAYER_COLORS[this.players.length % PLAYER_COLORS.length],
        score: 0,
        questionsAnswered: 0,
        correctAnswers: 0
      };
      
      this.players.push(player);
      this.renderPlayerSetup();
    },
    
    removePlayer(playerId) {
      this.players = this.players.filter(p => p.id !== playerId);
      this.renderPlayerSetup();
    },
    
    updatePlayerName(playerId, name) {
      const player = this.players.find(p => p.id === playerId);
      if (player) player.name = name.trim() || `Hráč ${this.players.indexOf(player) + 1}`;
    },
    
    renderPlayerSetup() {
      const container = document.getElementById('playerSetup');
      container.innerHTML = this.players.map((player, index) => `
        <div class="player-input-row">
          <div class="player-color-badge" style="background: ${player.color};"></div>
          <input 
            type="text" 
            value="${player.name}" 
            placeholder="Jméno hráče ${index + 1}"
            onchange="app.updatePlayerName(${player.id}, this.value)"
          />
          ${this.players.length > 2 ? `
            <button class="btn-remove" onclick="app.removePlayer(${player.id})">✕</button>
          ` : ''}
        </div>
      `).join('');
    },
    
    // ===== GAME FLOW =====
    startGame() {
      if (this.players.length < 2) {
        this.showMessage('setupMessage', 'Musíte být alespoň 2 hráči!', 'bad');
        return;
      }
      
      if (this.countries.length === 0) {
        this.showMessage('setupMessage', 'Seznam zemí ještě není načtený!', 'bad');
        return;
      }
      
      // Validate player names
      const hasEmptyNames = this.players.some(p => !p.name.trim());
      if (hasEmptyNames) {
        this.showMessage('setupMessage', 'Všichni hráči musí mít jméno!', 'bad');
        return;
      }
      
      // Reset game state
      this.players.forEach(p => {
        p.score = 0;
        p.questionsAnswered = 0;
        p.correctAnswers = 0;
      });
      
      this.currentPlayerIndex = -1; // Start at -1 so first nextTurn() moves to 0
      this.gameState = 'playing';
      
      this.showScreen('gameScreen');
      this.nextTurn();
    },
    
    nextTurn() {
      // Check if all players finished their questions
      const allFinished = this.players.every(p => p.questionsAnswered >= QUESTIONS_PER_PLAYER);
      if (allFinished) {
        this.endGame();
        return;
      }
      
      // Move to next player (rotate through players)
      this.currentPlayerIndex = (this.currentPlayerIndex + 1) % this.players.length;
      
      // Skip players who already finished their questions
      let attempts = 0;
      while (this.players[this.currentPlayerIndex].questionsAnswered >= QUESTIONS_PER_PLAYER) {
        this.currentPlayerIndex = (this.currentPlayerIndex + 1) % this.players.length;
        attempts++;
        if (attempts > this.players.length) break; // Safety check
      }
      
      this.isAnswered = false;
      this.timeRemaining = TIME_PER_QUESTION;
      this.hideMessage('gameMessage');
      
      this.renderScoreboard();
      this.buildQuestion();
      this.startTimer();
    },
    
    renderScoreboard() {
      const container = document.getElementById('scoreboard');
      container.innerHTML = this.players.map((player, index) => {
        const isActive = index === this.currentPlayerIndex;
        const accuracy = player.questionsAnswered > 0 
          ? Math.round((player.correctAnswers / player.questionsAnswered) * 100) 
          : 0;
        
        return `
          <div class="player-card ${isActive ? 'active' : ''}" style="border-color: ${player.color};">
            <div class="name" style="color: ${player.color};">${player.name}</div>
            <div class="score">${player.score}</div>
            <div class="details">
              ${player.questionsAnswered} / ${QUESTIONS_PER_PLAYER} otázek<br>
              ${accuracy}% úspěšnost
            </div>
            ${isActive ? `
              <div class="timer-display" id="timer">${this.timeRemaining}</div>
            ` : ''}
          </div>
        `;
      }).join('');
    },
    
    // ===== TIMER =====
    startTimer() {
      this.stopTimer();
      
      this.timerInterval = setInterval(() => {
        this.timeRemaining--;
        
        const timerEl = document.getElementById('timer');
        if (timerEl) {
          timerEl.textContent = this.timeRemaining;
          
          if (this.timeRemaining <= 10) {
            timerEl.classList.add('warning');
          } else {
            timerEl.classList.remove('warning');
          }
        }
        
        if (this.timeRemaining <= 0) {
          this.stopTimer();
          if (!this.isAnswered) {
            this.timeoutAnswer();
          }
        }
      }, 1000);
    },
    
    stopTimer() {
      if (this.timerInterval) {
        clearInterval(this.timerInterval);
        this.timerInterval = null;
      }
    },
    
    timeoutAnswer() {
      this.isAnswered = true;
      this.setChoicesEnabled(false);
      
      const currentPlayer = this.players[this.currentPlayerIndex];
      currentPlayer.questionsAnswered++;
      
      this.showMessage('gameMessage', 
        `⏱️ Čas vypršel! Správná odpověď: ${this.currentQuestion.answerName}`, 'bad');
      
      this.renderScoreboard();
      
      setTimeout(() => this.nextTurn(), 2500);
    },
    
    // ===== QUESTIONS =====
    buildQuestion() {
      const answer = this.countries[Math.floor(Math.random() * this.countries.length)];
      const otherCountries = this.countries.filter(c => c.code !== answer.code);

      const shuffled = this.shuffle([...otherCountries]);
      const options = shuffled.slice(0, CHOICE_COUNT - 1).map(c => ({
        code: c.code,
        name: c.name
      }));

      options.push({ code: answer.code, name: answer.name });

      this.currentQuestion = {
        answerCode: answer.code,
        answerName: answer.name,
        answerFlag: answer.flagPng,
        options: this.shuffle(options)
      };

      const flagImg = document.getElementById('flagImg');
      flagImg.src = this.currentQuestion.answerFlag;
      flagImg.alt = `Vlajka: ${this.currentQuestion.answerName}`;

      // Preload next flag for smoother transitions
      if (this.countries.length > 0) {
        const nextFlag = this.countries[Math.floor(Math.random() * this.countries.length)];
        const preload = new Image();
        preload.src = nextFlag.flagPng;
      }

      this.renderChoices();
    },
    
    renderChoices() {
      const container = document.getElementById('choices');
      container.innerHTML = this.currentQuestion.options.map((opt, index) => `
        <button 
          class="choice" 
          data-code="${opt.code}"
          onclick="app.answerQuestion('${opt.code}')"
        >
          ${opt.name}
        </button>
      `).join('');
    },
    
    answerQuestion(chosenCode) {
      if (this.isAnswered) return;
      
      this.isAnswered = true;
      this.stopTimer();
      this.setChoicesEnabled(false);
      
      const currentPlayer = this.players[this.currentPlayerIndex];
      currentPlayer.questionsAnswered++;
      
      const isCorrect = chosenCode === this.currentQuestion.answerCode;
      
      // Visual feedback
      const buttons = document.querySelectorAll('#choices button');
      buttons.forEach(btn => {
        if (btn.dataset.code === this.currentQuestion.answerCode) {
          btn.classList.add('correct');
        }
        if (btn.dataset.code === chosenCode && !isCorrect) {
          btn.classList.add('incorrect');
        }
      });

      if (isCorrect) {
        currentPlayer.score++;
        currentPlayer.correctAnswers++;
        this.showMessage('gameMessage', `✅ Správně! To je ${this.currentQuestion.answerName}.`, 'ok');
      } else {
        const chosenName = this.currentQuestion.options.find(o => o.code === chosenCode)?.name || '…';
        this.showMessage('gameMessage', 
          `❌ Špatně. Vybral(a) jsi „${chosenName}“, správně je „${this.currentQuestion.answerName}“.`, 'bad');
      }

      this.renderScoreboard();
      
      setTimeout(() => this.nextTurn(), 2500);
    },
    
    // ===== RESULTS =====
    endGame() {
      this.gameState = 'results';
      this.showScreen('resultsScreen');

      const sortedPlayers = [...this.players].sort((a, b) => b.score - a.score);
      const medals = ['🥇', '🥈', '🥉'];
      const container = document.getElementById('resultsList');

      container.innerHTML = sortedPlayers.map((player, index) => {
        const accuracy = player.questionsAnswered > 0
          ? Math.round((player.correctAnswers / player.questionsAnswered) * 100)
          : 0;

        return `
          <div class="result-item" style="border-left-color: ${player.color};">
            <div class="result-rank">${medals[index] || (index + 1) + '.'}</div>
            <div class="result-info">
              <div class="result-name" style="color: ${player.color};">${player.name}</div>
              <div class="result-stats">${accuracy}% úspěšnost · ${player.correctAnswers}/${player.questionsAnswered} správně</div>
            </div>
            <div class="result-score">${player.score}</div>
          </div>
        `;
      }).join('');
    },
    
    newGame() {
      this.startGame();
    },
    
    backToSetup() {
      this.gameState = 'setup';
      this.showScreen('setupScreen');
      this.stopTimer();
    },
    
    // ===== UI HELPERS =====
    showScreen(screenId) {
      document.querySelectorAll('.setup-screen, .game-screen, .results-screen')
        .forEach(screen => screen.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    },
    
    showMessage(elementId, text, kind) {
      const el = document.getElementById(elementId);
      el.style.display = 'block';
      el.textContent = text;
      el.classList.remove('ok', 'bad');
      if (kind) el.classList.add(kind);
    },
    
    hideMessage(elementId) {
      const el = document.getElementById(elementId);
      el.style.display = 'none';
      el.textContent = '';
      el.classList.remove('ok', 'bad');
    },
    
    setChoicesEnabled(enabled) {
      document.querySelectorAll('#choices button')
        .forEach(btn => btn.disabled = !enabled);
    },
    
    // ===== UTILS =====
    shuffle(arr) {
      const shuffled = [...arr];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }
  };
  
  // Make app globally accessible
  window.app = app;
  
  // Start the app
  app.init();
})();
</script>

<script>
// ===== SERVICE WORKER (PWA offline podpora) =====
if ('serviceWorker' in navigator) {
  // Inline service worker jako blob
  const swCode = `
    const CACHE = 'souboj-vlajek-v1';
    const FLAGCDN = 'https://flagcdn.com';

    self.addEventListener('install', e => {
      self.skipWaiting();
    });

    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        )
      );
      self.clients.claim();
    });

    self.addEventListener('fetch', e => {
      const url = e.request.url;
      // Cache vlajky z flagcdn.com
      if (url.startsWith(FLAGCDN)) {
        e.respondWith(
          caches.open(CACHE).then(cache =>
            cache.match(e.request).then(cached => {
              if (cached) return cached;
              return fetch(e.request).then(res => {
                cache.put(e.request, res.clone());
                return res;
              }).catch(() => cached);
            })
          )
        );
        return;
      }
      // Pro ostatní requesty — network first, pak cache
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;

  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl, { scope: '/' })
    .then(reg => console.log('SW registrován:', reg.scope))
    .catch(err => console.warn('SW chyba:', err));
}
</script>
